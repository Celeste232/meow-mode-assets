<svg xmlns="http://www.w3.org/2000/svg" width="180" height="140" viewBox="0 0 180 140">
  <style>
    .line { fill:white; stroke:#111111; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .ink { fill:#111111; stroke:none; }
    .none { fill:none; stroke:#111111; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes shake { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    @keyframes tail { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(10deg)} }
    @keyframes paw { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes heart { 0%,100%{opacity:.35; transform:scale(.9)} 50%{opacity:1; transform:scale(1.1)} }
    @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    @keyframes roll { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
    @keyframes zzz { 0%{opacity:0; transform:translate(0,0)} 35%{opacity:1} 100%{opacity:0; transform:translate(12px,-18px)} }
  </style>
  <g style="animation:bob 1.5s ease-in-out infinite; transform-origin:90px 70px">
    <circle class="line" cx="82" cy="48" r="20"/>
    <ellipse class="line" cx="82" cy="88" rx="30" ry="28"/>
    <path class="line" d="M68 34 L74 21 L81 36"/>
    <path class="line" d="M94 36 L103 23 L105 41"/>
    <circle class="ink" cx="76" cy="47" r="2"/>
    <circle class="ink" cx="88" cy="47" r="2"/>
    <path class="none" d="M80 55 Q84 58 88 55"/>
    <path class="none" d="M66 50 L53 46"/>
    <path class="none" d="M67 56 L53 57"/>
    <path class="none" d="M98 50 L112 46"/>
    <path class="none" d="M98 56 L113 57"/>
    <path class="none" style="animation:paw .55s ease-in-out infinite; transform-origin:61px 82px" d="M66 82 Q52 74 51 58"/>
    <path class="none" d="M99 82 Q111 94 101 108"/>
    <path class="none" style="animation:tail .9s ease-in-out infinite; transform-origin:108px 85px" d="M108 85 Q139 74 126 48"/>
  </g>
</svg>
