<svg xmlns="http://www.w3.org/2000/svg" width="180" height="140" viewBox="0 0 180 140">
  <style>
    .line { fill:white; stroke:#111111; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .ink { fill:#111111; stroke:none; }
    .none { fill:none; stroke:#111111; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes shake { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    @keyframes tail { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(10deg)} }
    @keyframes paw { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes heart { 0%,100%{opacity:.35; transform:scale(.9)} 50%{opacity:1; transform:scale(1.1)} }
    @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    @keyframes roll { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
    @keyframes zzz { 0%{opacity:0; transform:translate(0,0)} 35%{opacity:1} 100%{opacity:0; transform:translate(12px,-18px)} }
  </style>
  <g style="animation:bob 1.6s ease-in-out infinite; transform-origin:88px 72px">
    <circle class="line" cx="71" cy="58" r="18"/>
    <ellipse class="line" cx="107" cy="70" rx="34" ry="19"/>
    <path class="line" d="M59 45 L65 34 L71 47"/>
    <path class="line" d="M78 45 L86 36 L87 50"/>
    <circle class="ink" cx="66" cy="57" r="1.8"/>
    <circle class="ink" cx="76" cy="57" r="1.8"/>
    <path class="none" d="M68 65 Q72 68 76 65"/>
    <path class="none" d="M56 59 L43 55"/>
    <path class="none" d="M57 65 L43 68"/>
    <path class="none" d="M86 84 L86 101"/>
    <path class="none" d="M102 86 L102 103"/>
    <path class="none" d="M124 85 L124 102"/>
    <path class="none" d="M136 80 L136 98"/>
    <path class="none" style="animation:tail .8s ease-in-out infinite; transform-origin:136px 61px" d="M136 61 Q158 47 149 29"/>
  </g>
  <path class="none" style="animation:heart 1s ease-in-out infinite; transform-origin:124px 39px" d="M124 45 C115 39 119 28 127 34 C133 25 144 32 139 42 C135 49 124 54 124 54 C124 54 119 50 124 45 Z"/>
</svg>
